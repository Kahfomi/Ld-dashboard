    // localStorage-based storage shim
    window.storage = {
      get: function(key) {
        try { var v=localStorage.getItem('ld_'+key); return Promise.resolve(v?{key:key,value:v}:null); }
        catch(e){ return Promise.resolve(null); }
      },
      set: function(key,value) {
        try { localStorage.setItem('ld_'+key,value); return Promise.resolve({key:key,value:value}); }
        catch(e){ return Promise.resolve(null); }
      },
      delete: function(key) {
        try { localStorage.removeItem('ld_'+key); return Promise.resolve({key:key,deleted:true}); }
        catch(e){ return Promise.resolve(null); }
      }
    };
